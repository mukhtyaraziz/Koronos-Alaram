<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRONOS — Alarm Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scanlines"></div>
<div id="flash-overlay"></div>

<div class="container">
  <header>
    <div class="brand">Kronos Systems v2.4</div>
  </header>

  <div class="clock-wrapper">
    <div class="clock-ring">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div>
        <div id="clock-display">00:00:00</div>
        <div class="clock-sub">
          <span id="ampm-display">AM</span>
          <span id="date-display">---</span>
        </div>
      </div>
    </div>
  </div>

  <div class="set-alarm-card">
    <div class="section-label">Set Alarm</div>
    <div class="form-row">
      <div class="input-group" style="max-width:90px">
        <label>Hour</label>
        <input type="number" id="inp-hour" min="1" max="12" value="7" placeholder="HH" />
      </div>
      <div class="input-group" style="flex:0; align-self:flex-end; margin-bottom:0.55rem">
        <span class="colon">:</span>
      </div>
      <div class="input-group" style="max-width:90px">
        <label>Minute</label>
        <input type="number" id="inp-min" min="0" max="59" value="00" placeholder="MM" />
      </div>
      <div class="input-group" style="max-width:80px">
        <label>AM / PM</label>
        <select id="inp-ampm">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
      <div class="input-group label-group">
        <label>Label (optional)</label>
        <input type="text" id="inp-label" placeholder="Wake up, Meeting..." maxlength="30" />
      </div>
      <button id="set-btn">+ Set</button>
    </div>
  </div>

  <div class="alarm-list-section">
    <div class="section-label">Active Alarms</div>
    <div id="alarm-list">
      <div class="empty-state">
        <div class="icon">⏰</div>
        No alarms set — add one above
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
